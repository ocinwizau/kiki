<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Vue Beachfront Cafe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 400px;
            background: #1c1c2e;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .chat-header {
            background: linear-gradient(135deg, #00a8e8, #007ea7);
            padding: 25px;
            text-align: center;
        }
        
        .chat-header h2 {
            color: white;
            font-size: 22px;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        .chat-messages {
            padding: 20px;
            min-height: 350px;
        }
        
        .message {
            background: #2a2a40;
            padding: 15px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            margin-bottom: 12px;
            color: white;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .message span {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            opacity: 0.7;
        }
        
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        
        .qr-btn {
            background: rgba(0, 168, 232, 0.15);
            color: #00a8e8;
            border: 1px solid #00a8e8;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .qr-btn:hover {
            background: #00a8e8;
            color: white;
        }
        
        .chat-input {
            padding: 15px 20px 25px;
            background: #161625;
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            background: #2a2a40;
            border: none;
            padding: 14px 18px;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input input::placeholder {
            color: #666;
        }
        
        .chat-input button {
            background: #00a8e8;
            border: none;
            width: 48px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .chat-input button:hover {
            transform: scale(1.1);
        }
        
        .typing {
            display: none;
            padding: 15px 18px;
            background: #2a2a40;
            border-radius: 18px;
            margin-bottom: 12px;
        }
        
        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00a8e8;
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite;
        }
        
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🌊 Aqua Vue</h2>
            <p>Hervey Bay's Beachfront Cafe</p>
        </div>
        
        <div class="chat-messages" id="chat">
            <div class="message">
                👋 Welcome to Aqua Vue! 🐋
                <br><br>Hervey Bay's favourite beachfront cafe ☕🌊
                <br><br>How can I help you today?
                <div class="quick-replies">
                    <button class="qr-btn" onclick="reply('Hours')">🕐 Hours</button>
                    <button class="qr-btn" onclick="reply('Menu')">🍽️ Menu</button>
                    <button class="qr-btn" onclick="reply('Book')">📋 Book Table</button>
                    <button class="qr-btn" onclick="reply('Location')">📍 Location</button>
                    <button class="qr-btn" onclick="reply('Contact')">📞 Contact</button>
                </div>
            </div>
        </div>
        
        <div class="typing" id="typing">
            <span></span><span></span><span></span>
        </div>
        
        <div class="chat-input">
            <input type="text" id="input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const typing = document.getElementById('typing');
        const input = document.getElementById('input');
        
        const responses = {
            'Hours': "🕐 We're open 6:30am - Midnight, 7 days a week! ☀️",
            'Menu': "🍽️ Check our full menu: https://www.aquavue.com.au/ — we serve breakfast, lunch & dinner!",
            'Book': "📋 Book a table here: https://www.aquavue.com.au/reservations — or call us on 07 4125 5528",
            'Location': "📍 We're at 415A Esplanade, Torquay — beachfront! 🌊 https://maps.google.com/?q=Aqua+Vue+Hervey+Bay",
            'Contact': "📞 Call: 07 4125 5528\n📧 Email: team@aquavue.com.au\n📍 415A Esplanade, Torquay"
        };
        
        const defaultResponse = "Thanks for reaching out! Tap one of the buttons above or call us on 07 4125 5528 ☕";
        
        function reply(text) {
            showMessage(text, 'user');
            typing.style.display = 'block';
            chat.scrollTop = chat.scrollHeight;
            
            setTimeout(() => {
                typing.style.display = 'none';
                const response = responses[text] || defaultResponse;
                showMessage(response, 'bot');
            }, 800);
        }
        
        function send() {
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            reply(text);
        }
        
        function showMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = text;
            div.style.background = type === 'user' ? '#00a8e8' : '#2a2a40';
            chat.insertBefore(div, typing);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
