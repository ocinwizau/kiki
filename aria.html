<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primary Care Medical | Aria — AI Receptionist</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --clinic: #1a6b4a;
    --clinic-mid: #2a8b60;
    --clinic-light: #e8f5ee;
    --white: #ffffff;
    --bg: #f0f7f4;
    --bg-dark: #e4f0ea;
    --text: #1a2a22;
    --muted: #6a8a76;
    --border: #c8e0d0;
    --alert: #e85a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #1a6b4a 0%, #2a8b60 50%, #3aab70 100%);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .wrapper { width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.3); }
  .header { background: linear-gradient(135deg, #1a6b4a, #2a8b60); padding: 20px; display: flex; align-items: center; gap: 14px; position: relative; }
  .header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, rgba(255,255,255,0.4), transparent); }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; position: relative; }
  .online { position: absolute; bottom: 1px; right: 1px; width: 12px; height: 12px; background: #4ade80; border-radius: 50%; border: 2px solid #1a6b4a; }
  .header-info h2 { font-size: 17px; font-weight: 700; color: #fff; }
  .header-info p { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .header-badge { margin-left: auto; font-size: 9px; color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 3px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }
  .emergency-banner { background: var(--alert); color: white; padding: 8px 14px; font-size: 12px; font-weight: 600; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .chat { background: var(--bg); height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg { display: flex; gap: 8px; animation: pop 0.25s ease both; }
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.user { flex-direction: row-reverse; }
  .msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
  .msg.ai .msg-av { background: linear-gradient(135deg, var(--clinic), var(--clinic-mid)); }
  .msg.user .msg-av { background: var(--clinic); }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
  .msg.ai .bubble { background: var(--white); color: var(--text); border-top-left-radius: 4px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .msg.user .bubble { background: var(--clinic); color: white; border-top-right-radius: 4px; }
  .card-bubble { max-width: 92%; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; border-top-left-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .card-header { background: linear-gradient(135deg, var(--clinic), var(--clinic-mid)); color: white; padding: 10px 14px; font-size: 13px; font-weight: 600; }
  .card-body { padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.7; }
  .card-body b { color: var(--clinic); }
  .card-btn { display: block; margin: 6px 14px; background: var(--clinic); color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background 0.15s; }
  .card-btn:last-child { margin-bottom: 12px; }
  .card-btn:hover { background: var(--clinic-mid); }
  .card-btn.secondary { background: transparent; color: var(--clinic); border: 1px solid var(--clinic); }
  .card-btn.alert { background: var(--alert); }
  .typing { display: flex; gap: 8px; align-items: center; }
  .typing-av { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--clinic), var(--clinic-mid)); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .typing-bubble { background: var(--white); border: 1px solid var(--border); border-radius: 16px; border-top-left-radius: 4px; padding: 12px 16px; display: flex; gap: 4px; align-items: center; }
  .typing-bubble span { width: 6px; height: 6px; border-radius: 50%; background: var(--clinic-mid); animation: bounce 1.2s infinite; }
  .typing-bubble span:nth-child(2){animation-delay:0.2s}
  .typing-bubble span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
  .quick-wrap { background: var(--bg-dark); padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 7px; border-top: 1px solid var(--border); }
  .qr { background: var(--white); border: 1px solid var(--border); color: var(--clinic); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 20px; cursor: pointer; transition: all 0.15s; min-height: 34px; }
  .qr:hover, .qr:active { background: var(--clinic); color: white; border-color: var(--clinic); }
  .input-row { background: var(--white); border-top: 1px solid var(--border); padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end; }
  #msg { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; resize: none; max-height: 90px; line-height: 1.4; min-height: 42px; }
  #msg:focus { border-color: var(--clinic-mid); }
  #msg::placeholder { color: var(--muted); }
  .send { width: 42px; height: 42px; border-radius: 50%; background: var(--clinic); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .send:hover { background: var(--clinic-mid); }
  .send:active { transform: scale(0.92); }
  .send svg { width: 17px; height: 17px; fill: white; }
  .footer { background: var(--white); text-align: center; padding: 8px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); }
  .footer a { color: var(--clinic-mid); text-decoration: none; }
  .float-call { position: fixed; bottom: 80px; right: 20px; width: 48px; height: 48px; background: var(--clinic); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 16px rgba(26,107,74,0.4); cursor: pointer; text-decoration: none; z-index: 100; transition: transform 0.2s; }
  .float-call:hover { transform: scale(1.1); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="avatar">🏥<div class="online"></div></div>
    <div class="header-info">
      <h2>Aria</h2>
      <p>Primary Care Medical Clinic · Hervey Bay</p>
    </div>
    <div class="header-badge">AI RECEPTIONIST</div>
  </div>
  <div class="emergency-banner">
    ⚠️ Medical emergency? Call <a href="tel:000" style="color:white;font-weight:800;margin-left:4px;">000</a> immediately
  </div>
  <div class="chat" id="chat"></div>
  <div class="quick-wrap">
    <button class="qr" onclick="showBilling()">💳 Bulk Billing</button>
    <button class="qr" onclick="showBooking()">📅 Book Appointment</button>
    <button class="qr" onclick="showHours()">🕐 Hours</button>
    <button class="qr" onclick="showServices()">🩺 Services</button>
    <button class="qr" onclick="quick('Are you accepting new patients?')">👤 New Patient</button>
    <button class="qr" onclick="showHuman()">📞 Call Reception</button>
  </div>
  <div class="input-row">
    <textarea id="msg" placeholder="Ask Aria anything..." rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
    <button class="send" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
  </div>
  <div class="footer">Powered by <a href="#">Groq AI</a> · <a href="https://www.primarymedical.com.au" target="_blank">primarymedical.com.au</a></div>
</div>

<a href="tel:0741243881" class="float-call" title="Call Primary Care">📞</a>

<script>
const SYSTEM_PROMPT = `You are Aria, the friendly AI receptionist for Primary Care Medical Clinic in Hervey Bay, Queensland, Australia.

YOUR PERSONALITY:
- Warm, calm and reassuring — like a caring receptionist
- Use simple clear language — many patients are elderly
- Keep replies SHORT — 2 to 3 sentences max
- Always offer a helpful next step

CLINIC DETAILS:
- Name: Primary Care Medical Clinic
- Address: 13 Medical Place, Urraween QLD 4655
- Phone: (07) 4124 3881
- Website: primarymedical.com.au
- Serving Hervey Bay community for over 27 years
- 11 doctors on staff
- Accredited General Practice

OPENING HOURS:
- Monday to Wednesday: 8:00am – 7:00pm
- Thursday to Friday: 8:00am – 5:00pm
- Saturday: 8:30am – 2:30pm
- Sunday & Public Holidays: Closed

BULK BILLING:
- Mixed billing practice
- BULK BILL: Concession card holders, DVA card holders, children under 16
- PRIVATE FEE: Standard patients (non-concession adults)
- Medicare rebates apply

SERVICES:
General Medicine, Women's Health, Family Health, Children's Health & Immunisations, Men's Health, Aboriginal Health, Elderly Care, Pregnancy Care, Health Checks & Care Plans, Occupational Health, Workers Comp, Mental Health Care, Skin Cancer Checks, Diabetes Clinic, Blood Pressure Clinic, Cardiology Care, Sleep Clinic, Travel Vaccinations, Iron Infusion, Obesity Management

BOOKINGS: Via HotDoc — hotdoc.com.au
ACCEPTING NEW PATIENTS: Yes
ONLINE CONSULTATIONS: Available — call to arrange
HOME VISITS: Available for regular patients — may incur costs

EMERGENCY PROTOCOL:
If patient describes chest pain, difficulty breathing, stroke symptoms, severe bleeding or any emergency — IMMEDIATELY say: "⚠️ This is a medical emergency. Please call 000 now or go to your nearest emergency department immediately."

RULES:
- Never provide medical diagnoses or clinical advice
- Never recommend specific medications
- Always direct emergencies to 000
- If unsure: "Please call us on (07) 4124 3881 and our team will help!"`;

function showBilling() {
  addCard(`<div class="card-header">💳 Bulk Billing Information</div>
    <div class="card-body">
      <b>Who we bulk bill:</b><br>
      ✅ Concession card holders<br>
      ✅ DVA card holders<br>
      ✅ Children under 16<br><br>
      <b>Private fee applies for:</b><br>
      Standard patients (non-concession adults)<br><br>
      Medicare rebates apply to all eligible services. Call us if you have any questions about fees 😊
    </div>
    <a class="card-btn" href="tel:0741243881">📞 Call About Fees</a>
    <a class="card-btn secondary" href="https://www.hotdoc.com.au/medical-centres/urraween-QLD-4655/primary-care-medical-clinic/doctors" target="_blank">Book Appointment →</a>`);
}

function showBooking() {
  addCard(`<div class="card-header">📅 Book an Appointment</div>
    <div class="card-body">
      <b>Primary Care Medical Clinic</b><br>
      13 Medical Place, Urraween QLD 4655<br><br>
      📞 (07) 4124 3881<br><br>
      <b>Hours:</b><br>
      Mon–Wed: 8:00am – 7:00pm<br>
      Thu–Fri: 8:00am – 5:00pm<br>
      Sat: 8:30am – 2:30pm<br>
      Sun: Closed<br><br>
      ✅ Accepting new patients
    </div>
    <a class="card-btn" href="https://www.hotdoc.com.au/medical-centres/urraween-QLD-4655/primary-care-medical-clinic/doctors" target="_blank">Book Online via HotDoc →</a>
    <a class="card-btn secondary" href="tel:0741243881">📞 Call Reception</a>`);
}

function showHours() {
  addCard(`<div class="card-header">🕐 Opening Hours</div>
    <div class="card-body">
      <b>Monday – Wednesday</b><br>8:00am – 7:00pm<br><br>
      <b>Thursday – Friday</b><br>8:00am – 5:00pm<br><br>
      <b>Saturday</b><br>8:30am – 2:30pm<br><br>
      <b>Sunday & Public Holidays</b><br>Closed<br><br>
      📍 13 Medical Place, Urraween QLD 4655
    </div>
    <a class="card-btn" href="https://www.hotdoc.com.au/medical-centres/urraween-QLD-4655/primary-care-medical-clinic/doctors" target="_blank">Book Appointment →</a>`);
}

function showServices() {
  addCard(`<div class="card-header">🩺 Our Services</div>
    <div class="card-body">
      <b>General Services</b><br>
      General Medicine · Women's Health · Men's Health · Family Health · Children's Health · Elderly Care · Pregnancy Care<br><br>
      <b>Special Clinics</b><br>
      Skin Cancer Checks · Diabetes · Blood Pressure · Cardiology · Sleep Clinic · Iron Infusions · Travel Vaccinations · Mental Health Care Plans<br><br>
      <b>Other</b><br>
      Occupational Health · Workers Comp · Immunisations
    </div>
    <a class="card-btn" href="https://www.primarymedical.com.au/our-services" target="_blank">View All Services →</a>
    <a class="card-btn secondary" href="tel:0741243881">📞 Call Reception</a>`);
}

function showHuman() {
  addCard(`<div class="card-header">📞 Contact Reception</div>
    <div class="card-body">
      Our friendly reception team is happy to help with appointments, referrals, results and anything else 😊<br><br>
      📞 <b>(07) 4124 3881</b><br>
      📍 13 Medical Place, Urraween QLD 4655<br><br>
      <b>Available:</b><br>
      Mon–Wed 8am–7pm · Thu–Fri 8am–5pm · Sat 8:30am–2:30pm
    </div>
    <a class="card-btn" href="tel:0741243881">📞 Call Now</a>
    <a class="card-btn secondary" href="https://www.primarymedical.com.au/contact" target="_blank">Send a Message →</a>`);
}

function addCard(innerHTML) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-av">🏥</div><div class="card-bubble"><div class="card">${innerHTML}</div></div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

const FALLBACK = {
  hours: "We're open Mon–Wed 8am–7pm, Thu–Fri 8am–5pm, and Sat 8:30am–2:30pm 🕐 Closed Sundays and public holidays.",
  newpatient: "Yes we're accepting new patients! 😊 You'll need to fill out a registration form on your first visit. Book online via HotDoc or call us on (07) 4124 3881.",
  online: "Yes we offer phone and online consultations 📞 Call us on (07) 4124 3881 to arrange one with your doctor.",
  home: "Yes we offer home visits for regular patients 🏠 There may be an out-of-pocket cost. Call us on (07) 4124 3881 for more information.",
  emergency: "⚠️ If this is a medical emergency please call 000 immediately or go to your nearest emergency department. Do not wait for an appointment.",
  default: "Hi! I'm Aria from Primary Care Medical Clinic 😊 I can help with bulk billing, appointments, hours, services or new patient info. How can I help?"
};

function getFallback(text) {
  const t = text.toLowerCase();
  if (t.includes('emergency') || t.includes('chest pain') || t.includes('cant breathe') || t.includes('stroke') || t.includes('bleeding')) return FALLBACK.emergency;
  if (t.includes('bulk') || t.includes('bill') || t.includes('fee') || t.includes('cost') || t.includes('medicare') || t.includes('concession')) { showBilling(); return null; }
  if (t.includes('book') || t.includes('appoint') || t.includes('see a doctor') || t.includes('hotdoc')) { showBooking(); return null; }
  if (t.includes('hour') || t.includes('open') || t.includes('close') || t.includes('time')) { showHours(); return null; }
  if (t.includes('service') || t.includes('what do you') || t.includes('offer') || t.includes('cancer') || t.includes('diabetes') || t.includes('mental') || t.includes('skin')) { showServices(); return null; }
  if (t.includes('new patient') || t.includes('register') || t.includes('first time')) return FALLBACK.newpatient;
  if (t.includes('online') || t.includes('telehealth') || t.includes('phone consult')) return FALLBACK.online;
  if (t.includes('home visit') || t.includes('come to me')) return FALLBACK.home;
  if (t.includes('call') || t.includes('speak') || t.includes('human') || t.includes('reception')) { showHuman(); return null; }
  return FALLBACK.default;
}

let history = [{ role: 'system', content: SYSTEM_PROMPT }];

async function send() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  const t = text.toLowerCase();

  if (t.includes('chest pain') || t.includes('cant breathe') || t.includes('stroke') || t.includes('emergency') || t.includes('dying')) {
    addMsg('user', text);
    addMsg('ai', '⚠️ This sounds like a medical emergency. Please call 000 now or go to your nearest emergency department immediately. Do not wait.');
    return;
  }

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  if (t.includes('bulk') || t.includes('bill') || t.includes('fee') || t.includes('cost')) { showBilling(); history.push({ role: 'assistant', content: "Here's our billing info!" }); return; }
  if (t.includes('book') || t.includes('appoint')) { showBooking(); history.push({ role: 'assistant', content: "Here's how to book!" }); return; }
  if (t.includes('hour') || t.includes('open')) { showHours(); history.push({ role: 'assistant', content: "Here are our hours!" }); return; }
  if (t.includes('service') || t.includes('what do you')) { showServices(); history.push({ role: 'assistant', content: "Here are our services!" }); return; }
  if (t.includes('call') || t.includes('speak') || t.includes('human')) { showHuman(); history.push({ role: 'assistant', content: "Here's how to reach us!" }); return; }

  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || getFallback(text);
    if (reply) { addMsg('ai', reply); history.push({ role: 'assistant', content: reply }); }
  } catch(err) {
    hideTyping();
    const reply = getFallback(text);
    if (reply) { addMsg('ai', reply); history.push({ role: 'assistant', content: reply }); }
  }
}

function quick(text) { document.getElementById('msg').value = text; send(); }

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-av">${role === 'ai' ? '🏥' : '👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

let typingEl = null;
function showTyping() {
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div'); typingEl.className = 'typing';
  typingEl.innerHTML = `<div class="typing-av">🏥</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  chat.appendChild(typingEl); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 90) + 'px'; }

window.onload = () => {
  setTimeout(() => {
    addMsg('ai', "Hi there! Welcome to Primary Care Medical Clinic 😊\n\nI'm Aria — I can help with bulk billing, appointments, our services, and opening hours.\n\nHow can I help you today?");
  }, 400);
};
</script>
</body>
</html>
